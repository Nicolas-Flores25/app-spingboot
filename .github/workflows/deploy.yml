name: CD Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name == 'main' && 'Production' || 'Development' }}
    runs-on: [self-hosted, "${{ github.ref_name == 'main' && 'prod' || 'dev' }}"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy with Docker Compose
        run: |
          echo "Haciendo pull de la última imagen desde el Registry local..."
          # Usamos la ruta completa para evitar errores de PATH
          /usr/bin/docker compose pull
          
          echo "Levantando servicios..."
          /usr/bin/docker compose up -d
